<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Preview Studio – iOS App Simulator</title>
  <meta name="description" content="Preview and test iOS app designs and web apps in a realistic iPhone simulator.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/ios.css">
</head>
<body>

  <header class="toolbar">
    <div class="toolbar-inner">
      <h1 class="toolbar-logo"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15l-5-5 1.41-1.41L11 14.17l7.59-7.59L20 8l-9 9z"/></svg> App Preview Studio <span>v1.0</span></h1>
      <div class="toolbar-controls">
        <div class="input-group">
          <input type="text" id="urlInput" placeholder="Enter URL to preview (e.g. https://example.com)">
          <button id="loadUrlBtn" class="btn btn-primary">Load</button>
        </div>
        <label class="upload-btn btn btn-outline">
          Upload Screenshot
          <input type="file" id="screenshotInput" accept="image/*" hidden>
        </label>
      </div>
      <div class="toolbar-actions">
        <div class="platform-toggle">
          <button class="platform-btn" onclick="window.location.href='index.html'">Android</button>
          <button class="platform-btn active">iOS</button>
        </div>
        <select id="deviceSelect" class="device-select"></select>
        <button id="rotateBtn" class="btn btn-icon" title="Rotate Device"><svg viewBox="0 0 24 24"><path d="M15.55 5.55L11 1v3.07C7.06 4.56 4 7.92 4 12s3.06 7.44 7 7.93v-2.02c-2.84-.48-5-2.94-5-5.91s2.16-5.43 5-5.91V1l4.55 4.55zM19.93 11c-.17-1.39-.72-2.73-1.62-3.89l-1.42 1.42c.54.75.88 1.6 1.02 2.47h2.02zM13 17.93v2.02c1.39-.17 2.73-.72 3.89-1.62l-1.42-1.42c-.75.54-1.59.89-2.47 1.02zm3.89-2.42l1.42 1.41c.9-1.16 1.45-2.5 1.62-3.89h-2.02c-.14.87-.48 1.72-1.02 2.48z"/></svg></button>
        <button id="screenshotBtn" class="btn btn-icon" title="Capture Screenshot"><svg viewBox="0 0 24 24"><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg></button>
        <button id="fullscreenBtn" class="btn btn-icon" title="Fullscreen"><svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
      </div>
    </div>
  </header>

  <main class="studio-area">
    <div class="device-container" id="deviceContainer">
      <div class="ios-frame" id="deviceFrame">

        <!-- Side buttons (visual only) -->
        <div class="ios-side-buttons">
          <div class="ios-side-btn mute"></div>
          <div class="ios-side-btn vol-up"></div>
          <div class="ios-side-btn vol-down"></div>
        </div>
        <div class="ios-side-btn-right"></div>

        <!-- Dynamic Island -->
        <div class="ios-dynamic-island"></div>

        <!-- Notch (fallback for older models) -->
        <div class="ios-notch">
          <div class="ios-notch-speaker"></div>
          <div class="ios-notch-camera"></div>
        </div>

        <!-- Status Bar -->
        <div class="ios-status-bar" id="statusBar">
          <span class="status-time" id="statusTime">12:00</span>
          <span class="status-center">iOS</span>
          <span class="status-icons ios-status-icons">
            <span class="ios-signal-bars">
              <span class="bar"></span>
              <span class="bar"></span>
              <span class="bar"></span>
              <span class="bar"></span>
            </span>
            <span><svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg></span>
            <span class="ios-battery">
              <span class="ios-battery-icon"><span class="fill"></span></span>
              <span class="ios-battery-pct">78%</span>
            </span>
          </span>
        </div>

        <!-- Screen -->
        <div class="ios-screen" id="deviceScreen">
          <div class="screen-placeholder" id="screenPlaceholder">
            <div class="placeholder-icon ios-placeholder-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15l-5-5 1.41-1.41L11 14.17l7.59-7.59L20 8l-9 9z"/></svg></div>
            <h2>iOS Simulator</h2>
            <p>Load a URL or upload a screenshot to preview your iOS app</p>
            <div class="placeholder-actions">
              <button id="placeholderUrlBtn" class="btn btn-primary">Enter a URL</button>
              <button id="placeholderUploadBtn" class="btn btn-outline">Upload Screenshot</button>
            </div>
          </div>
          <iframe id="appFrame" class="app-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
          <img id="screenshotPreview" class="screenshot-preview" alt="App Screenshot Preview">
        </div>

        <!-- Home Indicator -->
        <div class="ios-home-indicator"></div>

      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/ios.js"></script>
</body>
</html>
